<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M-Site Expense Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏗️</text></svg>">
    <link rel="alternate icon" type="image/png" href="/icon-192.png?v=2">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icon-192.png?v=2">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      html, body {
        background-color: #121210 !important;
        color: #CECAC0;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow-x: hidden;
      }
      html.light-theme, html.light-theme body {
        background-color: #EAE8E3 !important;
        color: #1D1B16;
      }
      @keyframes initial-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        var isDark = localStorage.getItem("msite-dark-mode") === "true";
        if (isDark) {
          document.documentElement.classList.add("dark-theme");
          document.documentElement.style.backgroundColor = "#121210";
        } else {
          document.documentElement.classList.add("light-theme");
          document.documentElement.style.backgroundColor = "#EAE8E3";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div style="min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background-color: inherit; color: inherit;">
        <div style="width: 34px; height: 34px; border: 3px solid rgba(255, 255, 255, 0.15); border-top-color: #F5B700; border-radius: 50%; animation: initial-spin 0.8s linear infinite;"></div>
        <div style="font-family: monospace; font-size: 12px; letter-spacing: 0.1em; opacity: 0.7;">SYNCING SITE LEDGER…</div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").then((r) => {
          r.update();
          r.addEventListener("updatefound", () => {
            const w = r.installing;
            if (w) {
              w.addEventListener("statechange", () => {
                if (w.state === "activated") {
                  window.location.reload();
                }
              });
            }
          });
        });
        let ref = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!ref) {
            ref = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
